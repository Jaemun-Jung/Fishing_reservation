name: debug-net
on:
  workflow_dispatch:
jobs:
  d:
    runs-on: ubuntu-latest
    steps:
      - shell: pwsh
        run: |
          $UA='Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36'
          foreach($u in @('https://thefishing.kr/','http://www.kumkangho.co.kr/','https://www.manaru.com/','https://supernova.sunsang24.com/')){
            $sw=[System.Diagnostics.Stopwatch]::StartNew()
            try { $h=Invoke-WebRequest -Uri $u -UserAgent $UA -UseBasicParsing -TimeoutSec 90; Write-Host ("{0}  OK status={1} len={2} time={3}s" -f $u,$h.StatusCode,$h.Content.Length,[int]$sw.Elapsed.TotalSeconds) }
            catch { Write-Host ("{0}  ERR({1}s) {2}" -f $u,[int]$sw.Elapsed.TotalSeconds,$_.Exception.Message) }
          }
